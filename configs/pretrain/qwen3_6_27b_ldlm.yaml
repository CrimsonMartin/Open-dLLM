model:
  model_path: Qwen/Qwen3.6-27B
  attn_implementation: eager
  ldlm:
    enabled: true
    encoder_model_name: Qwen/Qwen3.6-27B
    seq_len: 64
    depth: 4
    decoder_noise_std: 3.0
    encoder_hidden_layer: -3
    decoder_num_layers: 2
    diffusion_head_depth: 4
    warmup_steps: 50000
    log_interval: 50
    gen_eval_interval: 2000
    log_latent_histograms: true
    log_samples: true

data:
  train_path: fineweb
  train_size: 1000000000000
  dataloader_type: native
  data_type: plaintext
  max_seq_len: 64
  text_keys: text
  drop_last: true

train:
  output_dir: Qwen3.6-27B_LDLM
  data_parallel_mode: ddp
  ulysses_parallel_size: 1
  global_batch_size: 16
  micro_batch_size: 1
  rmpad: false
  rmpad_with_pos_ids: true
  bsz_warmup_ratio: 0.0
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200
  optimizer: adamw
  lr: 3.0e-4
  lr_warmup_ratio: 0.007
  lr_decay_style: constant
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0
  enable_mixed_precision: false
  enable_gradient_checkpointing: false
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  enable_full_determinism: false
  empty_cache_steps: 100
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 100
  save_hf_weights: true
  wandb_project: Qwen3.6-27B-LDLM
  wandb_name: Qwen3.6-27B-LDLM-2GPU
